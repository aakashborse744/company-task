<!DOCTYPE html>
<html>
<head>
    <title>Form Page</title>
</head>
<body>

    <hr>

    <div align="center">
        <h2>COMPANY LEVEL TASK</h2>
        <hr>

        <form action="#no_action" method="post">
         
            <label><b>Name:</b></label>
            <input type="text" name="name" placeholder="Enter your name" required>
            <br><br>

             <label><b>Date of Birth:</b></label>
            <input type="date" name="dob">
            <br><br>

             <label><b>Gender:</b></label>
            <input type="radio" name="gender" value="Male"> Male
            <input type="radio" name="gender" value="Female"> Female
            <input type="radio" name="gender" value="Other"> Other
            <br><br>


            <label><b>Country:</b></label>
            <select name="country">
                <option value="">Select a Country</option>
                <option value="USA">USA</option>
                <option value="Canada">Canada</option>
                <option value="India">India</option>
                <option value="UK">UK</option>
            </select>
            <br><br>

            <label><b>Technology:</b></label>
            <input type="checkbox" name="technology" value="HTML"> HTML
            <input type="checkbox" name="technology" value="CSS"> CSS
            <input type="checkbox" name="technology" value="JAVASCRIPT">JAVASCRIPT
            <input type="checkbox" name="technology" value="PYTHON"> PYTHON
            <input type="checkbox" name="technology" value="DA">DA
            <br><br>

            <label><b>Address:</b></label>
            <textarea name="address" rows="4" cols="30" placeholder="Enter your address"></textarea>
            <br><br>

            <label><b>Highest Qualification:</b></label>
        <select name="qualification" required>
            <option value="">Select Qualification</option>
            <option value="SSC">SSC</option>
            <option value="HSC">HSC</option>
            <option value="Diploma">Diploma</option>
            <option value="B.Tech">B.Tech</option>
            <option value="B.E">B.E</option>
            <option value="B.Sc">B.Sc</option>
            <option value="M.Tech">M.Tech</option>
            <option value="MCA">MCA</option>
            <option value="MBA">MBA</option>
            <option value="Other">Other</option>
        </select>
        <br><br>

        <label><b>College/University Name:</b></label>
        <input type="text" name="college" placeholder="Enter college/university name" required>
        <br><br>

        <label><b>Resume Upload:</b></label>
        <input type="file" name="resume" accept=".pdf,.doc,.docx" required>
        <br><br>


            <button type="submit"
        style="background-color: blue;
               color: white;
               padding: 10px 20px;">              
    Submit
</button>

<button type="reset"
        style="background-color: red;
               color: white; 
               padding: 10px 20px;">
        Reset
</button>


        </form>
        
    </div>

</body>
</html>
